name: Build TandOrbit

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Build macOS app
        run: pyinstaller tandorbit.spec --noconfirm

      - name: Fix bundle for code signing
        run: python scripts/fix_bundle_for_codesign.py dist/TandOrbit.app

      - name: Ad-hoc sign the app
        run: codesign --force --sign - dist/TandOrbit.app

      - name: Debug bundle structure
        run: |
          echo "=== Resources symlinks ==="
          find dist/TandOrbit.app/Contents/Resources -maxdepth 2 -type l -exec ls -la {} \;
          echo "=== Frameworks symlinks ==="
          find dist/TandOrbit.app/Contents/Frameworks -maxdepth 2 -type l -exec ls -la {} \;
          echo "=== icon.png info ==="
          ls -la dist/TandOrbit.app/Contents/Resources/icon.png 2>/dev/null || echo "not found"
          ls -la dist/TandOrbit.app/Contents/Frameworks/icon.png 2>/dev/null || echo "not found in Frameworks"
          echo "=== base_library.zip info ==="
          ls -la dist/TandOrbit.app/Contents/Resources/base_library.zip 2>/dev/null || echo "not found"
          ls -la dist/TandOrbit.app/Contents/Frameworks/base_library.zip 2>/dev/null || echo "not found in Frameworks"

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          cp -a dist/TandOrbit.app dist/dmg/
          hdiutil create -volname "TandOrbit" -srcfolder dist/dmg -ov -format UDZO dist/TandOrbit-macOS.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: TandOrbit-macOS
          path: |
            dist/TandOrbit.app
            dist/TandOrbit-macOS.dmg

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Build Windows GUI
        run: pyinstaller tandorbit_gui.spec --noconfirm

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TandOrbit-Windows
          path: dist/TandOrbit/

  release:
    name: Create Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: TandOrbit-macOS
          path: artifacts/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TandOrbit-Windows
          path: artifacts/windows

      - name: Zip Windows build
        run: cd artifacts/windows && zip -r ../../TandOrbit-Windows.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac/TandOrbit-macOS.dmg
            TandOrbit-Windows.zip
          generate_release_notes: true
          draft: false
          prerelease: false
