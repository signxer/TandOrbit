# TandOrbit 默认配置文件

display:
  primary_id: 1
  secondary_id: 2
  profiles: {}

windows:
  host: "192.168.1.100"
  port: 5000
  timeout: 10.0

deskflow:
  auto_restart: true
  server_host: "192.168.1.100"
  server_port: 24800
  client_name: "mac"

betterdisplay:
  cli_path: "/Applications/BetterDisplay.app/Contents/MacOS/betterdisplaycli"

audio:
  mac_output: "AirPods"
  windows_output: "USB DAC"

hotkeys:
  switch_mac: "Ctrl+Alt+1"
  switch_windows: "Ctrl+Alt+2"
  switch_share: "Ctrl+Alt+3"

log_level: "INFO"
log_dir: "logs"
log_retention_days: 30
